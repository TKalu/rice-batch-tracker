<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tharaka's Rice Batches</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f8f8f6;
    color: #333;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    color: #2e5e2e;
}

.batch-card {
    background: white;
    padding: 20px;
    margin: 30px 0;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.progress-bar {
    width: 100%;
    background: #ddd;
    border-radius: 20px;
    overflow: hidden;
    margin: 15px 0;
}

.progress {
    height: 18px;
    background: #2e8b57;
}

.stage-container {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.stage {
    flex: 1;
    font-size: 13px;
}

.circle {
    width: 50px;
    height: 50px;
    margin: auto;
    border-radius: 50%;
    background: #ccc;
    line-height: 50px;
    font-size: 20px;
}

.completed .circle {
    background: #1b5e20;
    color: white;
}

.active .circle {
    background: #4caf50;
    color: white;
}

.whatsapp-btn {
    display: inline-block;
    padding: 10px 18px;
    background: #25d366;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    margin-top: 15px;
}

.footer {
    margin-top: 50px;
    font-size: 13px;
    color: #666;
}
</style>
</head>
<body>

<div class="container">
<h1>🌾 Chemical-Free Rice Batches</h1>

<div id="batchContainer"></div>

<div class="footer">
Transparent. Limited. Chemical-Free.
</div>

</div>

<script>

fetch("batches.json")
.then(response => response.json())
.then(batches => {

    const container = document.getElementById("batchContainer");

    batches.forEach(batch => {

        const progressPercent = (batch.reservedKg / batch.totalKg) * 100;

        const stages = ["storage", "milling", "packaging", "delivery"];

        let stageHTML = "";
        let reachedCurrent = false;

        stages.forEach(stage => {

            let className = "stage";

            if(stage === batch.stage) {
                className += " active";
                reachedCurrent = true;
            }
            else if(!reachedCurrent) {
                className += " completed";
            }

            let emoji = {
                storage: "🌾",
                milling: "⚙️",
                packaging: "📦",
                delivery: "🚚"
            }[stage];

            stageHTML += `
                <div class="${className}">
                    <div class="circle">${emoji}</div>
                    ${stage}
                </div>
            `;
        });

        const card = document.createElement("div");
        card.className = "batch-card";

        card.innerHTML = `
            <h2>${batch.title} (${batch.batchId})</h2>
            <p><strong>${batch.reservedKg}kg Reserved / ${batch.totalKg}kg</strong></p>

            <div class="progress-bar">
                <div class="progress" style="width:${progressPercent}%"></div>
            </div>

            <div class="stage-container">
                ${stageHTML}
            </div>

            <p><strong>Estimated Delivery:</strong> ${batch.estimatedDelivery}</p>

            ${batch.status === "active" ? 
                `<a class="whatsapp-btn" href="https://wa.me/947XXXXXXXX" target="_blank">Reserve via WhatsApp</a>` 
                : `<p><strong>✔ Completed Batch</strong></p>`
            }
        `;

        container.appendChild(card);
    });

});
</script>

</body>
</html>
