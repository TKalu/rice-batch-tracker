<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tharaka's Chemical-Free Kirisamba</title>
<style>

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f8f8f6;
    color: #333;
    text-align: center;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

h1 {
    color: #2e5e2e;
}

.progress-bar {
    width: 100%;
    background: #ddd;
    border-radius: 20px;
    overflow: hidden;
    margin: 20px 0;
}

.progress {
    height: 20px;
    background: #2e8b57;
    width: 0%;
}

.stage-container {
    display: flex;
    justify-content: space-between;
    margin-top: 40px;
}

.stage {
    flex: 1;
    padding: 10px;
    font-size: 14px;
}

.circle {
    width: 60px;
    height: 60px;
    margin: auto;
    border-radius: 50%;
    background: #ccc;
    line-height: 60px;
    font-size: 24px;
}

.completed .circle {
    background: #1b5e20;
    color: white;
}

.active .circle {
    background: #4caf50;
    color: white;
}

.footer {
    margin-top: 40px;
    font-size: 14px;
    color: #666;
}

.whatsapp-btn {
    display: inline-block;
    padding: 12px 20px;
    background: #25d366;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    margin-top: 20px;
}

</style>
</head>
<body>

<div class="container">

<h1>🌾 Chemical-Free Kirisamba</h1>
<p><strong>Batch #01 – Limited 120kg</strong></p>

<h3>Batch Progress</h3>
<p><strong id="reservedText">78kg Reserved / 120kg</strong></p>

<div class="progress-bar">
    <div class="progress" id="progressBar"></div>
</div>

<h3>Current Processing Stage</h3>

<div class="stage-container">
    <div class="stage" id="storage">
        <div class="circle">🌾</div>
        Storage
    </div>

    <div class="stage" id="milling">
        <div class="circle">⚙️</div>
        Milling
    </div>

    <div class="stage" id="packaging">
        <div class="circle">📦</div>
        Packaging
    </div>

    <div class="stage" id="delivery">
        <div class="circle">🚚</div>
        Delivery
    </div>
</div>

<a class="whatsapp-btn" href="https://wa.me/94XXXXXXXXX" target="_blank">
Order via WhatsApp
</a>

<div class="footer">
Next batch currently aging.<br>
Estimated availability: May 2026
</div>

</div>

<script>

// ======= MANUAL EDIT SECTION =======
const totalKg = 120;
const reservedKg = 78;
const currentStage = "milling";
// ===================================

document.getElementById("progressBar").style.width =
    (reservedKg / totalKg) * 100 + "%";

const stages = ["storage", "milling", "packaging", "delivery"];

let reachedCurrent = false;

stages.forEach(stage => {
    const element = document.getElementById(stage);

    if(stage === currentStage) {
        element.classList.add("active");
        reachedCurrent = true;
    }
    else if(!reachedCurrent) {
        element.classList.add("completed");
    }
});

</script>

</body>
</html>
